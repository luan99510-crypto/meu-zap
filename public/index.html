<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuZap</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0d0d0d; color: #e5e5e5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #auth { background: #111; padding: 32px; border-radius: 12px; width: 340px; border: 1px solid #222; }
        #auth h1 { color: #22c55e; margin-bottom: 20px; text-align: center; font-size: 28px; }
        #auth input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; outline: none; }
        #auth button.btn-main { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: #22c55e; color: #000; font-weight: bold; cursor: pointer; font-size: 14px; }
        #auth button.btn-main:hover { background: #16a34a; }
        .link { text-align: center; margin-top: 12px; font-size: 13px; color: #555; cursor: pointer; }
        .link span { color: #22c55e; }
        .erro { color: #f87171; font-size: 13px; text-align: center; margin-top: 8px; display: none; }
        .sucesso { color: #22c55e; font-size: 13px; text-align: center; margin-top: 8px; display: none; }
        .codigo-box { background: #1a2a1f; border: 1px solid #22c55e; border-radius: 8px; padding: 12px; text-align: center; margin-top: 12px; display: none; }
        .codigo-box p { font-size: 12px; color: #888; margin-bottom: 6px; }
        .codigo-box span { font-size: 28px; font-weight: bold; letter-spacing: 8px; color: #22c55e; }
        #app { display: none; width: 100vw; height: 100vh; }
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #111; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .sidebar-header h2 { color: #22c55e; font-size: 20px; }
        .btn-add { background: #22c55e; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; color: #000; display: flex; align-items: center; justify-content: center; }
        #contatos { flex: 1; overflow-y: auto; }
        .contato { padding: 14px 16px; cursor: pointer; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 12px; }
        .contato:hover, .contato.active { background: #1a2a1f; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1e3a2f; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #22c55e; font-size: 16px; flex-shrink: 0; }
        .contato-info .nome { font-size: 14px; font-weight: 500; color: #e5e5e5; }
        .contato-info .preview { font-size: 12px; color: #555; }
        .chat { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
        .chat-vazio { flex: 1; display: flex; align-items: center; justify-content: center; color: #333; font-size: 15px; }
        .chat-header { padding: 14px 20px; border-bottom: 1px solid #222; background: #0f0f0f; display: flex; align-items: center; gap: 12px; }
        .chat-header .nome { font-weight: bold; font-size: 15px; }
        .chat-header .status { font-size: 12px; color: #22c55e; }
        #mensagens { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
        .msg { max-width: 65%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; }
        .msg.enviada { align-self: flex-end; background: #1a3d28; color: #d4f7d4; border-bottom-right-radius: 4px; }
        .msg.recebida { align-self: flex-start; background: #1c1c1c; color: #d4d4d4; border-bottom-left-radius: 4px; }
        .msg .hora { font-size: 10px; color: #555; margin-top: 4px; text-align: right; }
        .input-area { padding: 12px 16px; border-top: 1px solid #222; display: flex; gap: 10px; background: #0f0f0f; }
        .input-area input { flex: 1; padding: 10px 16px; border-radius: 22px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #fff; font-size: 13px; outline: none; }
        .input-area button { background: #22c55e; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 16px; flex-shrink: 0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: #111; padding: 28px; border-radius: 12px; width: 320px; border: 1px solid #222; }
        .modal h3 { color: #22c55e; margin-bottom: 16px; }
        .modal input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; outline: none; }
        .modal-btns { display: flex; gap: 10px; margin-top: 12px; }
        .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-confirmar { background: #22c55e; color: #000; }
        .btn-cancelar { background: #1a1a1a; color: #888; border: 1px solid #333 !important; }
    </style>
</head>
<body>

<div id="auth">
    <h1>MeuZap</h1>
    <div id="tela-login">
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-senha" placeholder="Senha">
        <button class="btn-main" onclick="login()">Entrar</button>
        <div class="erro" id="login-erro"></div>
        <div class="link" onclick="mostrarTela('tela-cadastro')">Não tem conta? <span>Cadastrar</span></div>
        <div class="link" onclick="mostrarTela('tela-verificar')">Já tem um código? <span>Verificar conta</span></div>
    </div>
    <div id="tela-cadastro" style="display:none">
        <input type="text" id="cad-username" placeholder="Nome de usuário">
        <input type="email" id="cad-email" placeholder="Email">
        <input type="password" id="cad-senha" placeholder="Senha">
        <button class="btn-main" onclick="cadastro()">Cadastrar</button>
        <div class="erro" id="cad-erro"></div>
        <div class="sucesso" id="cad-sucesso"></div>
        <div class="codigo-box" id="codigo-box">
            <p>Seu código de verificação:</p>
            <span id="codigo-display"></span>
        </div>
        <div class="link" onclick="mostrarTela('tela-login')">Já tem conta? <span>Entrar</span></div>
    </div>
    <div id="tela-verificar" style="display:none">
        <p style="color:#888;font-size:13px;margin-bottom:12px;text-align:center;">Digite o código de verificação</p>
        <input type="text" id="ver-codigo" placeholder="Código de 6 dígitos" maxlength="6">
        <input type="email" id="ver-email" placeholder="Seu email">
        <button class="btn-main" onclick="verificar()">Verificar</button>
        <div class="erro" id="ver-erro"></div>
        <div class="sucesso" id="ver-sucesso"></div>
        <div class="link" onclick="mostrarTela('tela-login')">Voltar ao <span>login</span></div>
    </div>
</div>

<div id="app">
    <div class="layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>MeuZap</h2>
                <button class="btn-add" onclick="abrirModalContato()" title="Adicionar contato">+</button>
            </div>
            <div id="contatos"></div>
        </div>
        <div class="chat" id="chat">
            <div class="chat-vazio" id="chat-vazio">Selecione um contato para conversar</div>
            <div id="chat-ativo" style="display:none; flex-direction:column; height:100%;">
                <div class="chat-header">
                    <div class="avatar" id="chat-avatar">?</div>
                    <div>
                        <div class="nome" id="chat-nome"></div>
                        <div class="status">online</div>
                    </div>
                </div>
                <div id="mensagens"></div>
                <div class="input-area">
                    <input type="text" id="msg-input" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter') enviarMensagem()">
                    <button onclick="enviarMensagem()">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modal-contato" class="modal-overlay" style="display:none">
    <div class="modal">
        <h3>Adicionar contato</h3>
        <input type="email" id="contato-email" placeholder="Email do contato">
        <div class="erro" id="contato-erro"></div>
        <div class="sucesso" id="contato-sucesso"></div>
        <div class="modal-btns">
            <button class="btn-cancelar" onclick="fecharModalContato()">Cancelar</button>
            <button class="btn-confirmar" onclick="adicionarContato()">Adicionar</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let token = null, meuId = null, contatoAtualId = null;

    function mostrarTela(id) {
        ['tela-login','tela-cadastro','tela-verificar'].forEach(t => document.getElementById(t).style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function mostrarErro(id, msg) {
        const el = document.getElementById(id);
        el.innerText = msg; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    function mostrarSucesso(id, msg) {
        const el = document.getElementById(id);
        el.innerText = msg; el.style.display = 'block';
    }

    async function cadastro() {
        const username = document.getElementById('cad-username').value.trim();
        const email = document.getElementById('cad-email').value.trim();
        const senha = document.getElementById('cad-senha').value;
        if (!username || !email || !senha) return mostrarErro('cad-erro', 'Preencha todos os campos');

        const res = await fetch('/api/auth/cadastro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, senha })
        });
        const data = await res.json();
        if (res.status === 201) {
            document.getElementById('codigo-display').innerText = data.codigo;
            document.getElementById('codigo-box').style.display = 'block';
            mostrarSucesso('cad-sucesso', 'Conta criada! Anote o código abaixo:');
            document.getElementById('ver-email').value = email;
            document.getElementById('ver-codigo').value = data.codigo;
        } else mostrarErro('cad-erro', data.erro);
    }

    async function verificar() {
        const email = document.getElementById('ver-email').value.trim();
        const codigo = document.getElementById('ver-codigo').value.trim();
        if (!email || !codigo) return mostrarErro('ver-erro', 'Preencha todos os campos');

        const res = await fetch('/api/auth/verificar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, codigo })
        });
        const data = await res.json();
        if (res.ok) {
            mostrarSucesso('ver-sucesso', 'Conta verificada! Redirecionando...');
            setTimeout(() => mostrarTela('tela-login'), 1500);
        } else mostrarErro('ver-erro', data.erro);
    }

    async function login() {
        const email = document.getElementById('login-email').value.trim();
        const senha = document.getElementById('login-senha').value;
        if (!email || !senha) return mostrarErro('login-erro', 'Preencha todos os campos');

        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (data.accessToken) {
            token = data.accessToken;
            meuId = data.id;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            socket.emit('join', meuId);
            carregarContatos();
        } else mostrarErro('login-erro', data.erro);
    }

    async function carregarContatos() {
        const res = await fetch('/api/contatos', { headers: { Authorization: `Bearer ${token}` } });
        const contatos = await res.json();
        document.getElementById('contatos').innerHTML = contatos.length === 0
            ? '<p style="padding:16px;color:#444;font-size:13px;">Nenhum contato ainda. Adicione alguém!</p>'
            : contatos.map(c => `
                <div class="contato" onclick="abrirConversa('${c._id}', '${c.username}')">
                    <div class="avatar">${c.username[0].toUpperCase()}</div>
                    <div class="contato-info">
                        <div class="nome">${c.username}</div>
                        <div class="preview">${c.email}</div>
                    </div>
                </div>`).join('');
    }

    async function abrirConversa(id, nome) {
        contatoAtualId = id;
        document.getElementById('chat-vazio').style.display = 'none';
        document.getElementById('chat-ativo').style.display = 'flex';
        document.getElementById('chat-nome').innerText = nome;
        document.getElementById('chat-avatar').innerText = nome[0].toUpperCase();
        document.querySelectorAll('.contato').forEach(c => c.classList.remove('active'));

        const res = await fetch(`/api/conversa/${id}`, { headers: { Authorization: `Bearer ${token}` } });
        const mensagens = await res.json();
        document.getElementById('mensagens').innerHTML = mensagens.map(m => `
            <div class="msg ${m.de === meuId ? 'enviada' : 'recebida'}">
                ${m.texto}
                <div class="hora">${new Date(m.criadoEm).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</div>
            </div>`).join('');
        scrollToBottom();
    }

    async function enviarMensagem() {
        const texto = document.getElementById('msg-input').value.trim();
        if (!texto || !contatoAtualId) return;

        await fetch('/api/enviar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ contatoId: contatoAtualId, texto })
        });

        socket.emit('mensagem-privada', { de: meuId, para: contatoAtualId, texto });
        adicionarMensagem(texto, 'enviada');
        document.getElementById('msg-input').value = '';
    }

    socket.on('nova-mensagem', (data) => {
        if (data.de === contatoAtualId) adicionarMensagem(data.texto, 'recebida');
    });

    function adicionarMensagem(texto, tipo) {
        const div = document.createElement('div');
        div.className = `msg ${tipo}`;
        const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
        div.innerHTML = `${texto}<div class="hora">${hora}</div>`;
        document.getElementById('mensagens').appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        const el = document.getElementById('mensagens');
        el.scrollTop = el.scrollHeight;
    }

    function abrirModalContato() {
        document.getElementById('modal-contato').style.display = 'flex';
        document.getElementById('contato-email').value = '';
        document.getElementById('contato-erro').style.display = 'none';
        document.getElementById('contato-sucesso').style.display = 'none';
    }

    function fecharModalContato() {
        document.getElementById('modal-contato').style.display = 'none';
    }

    async function adicionarContato() {
        const email = document.getElementById('contato-email').value.trim();
        if (!email) return mostrarErro('contato-erro', 'Digite um email');

        const res = await fetch('/api/contatos/adicionar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
            mostrarSucesso('contato-sucesso', 'Contato adicionado!');
            setTimeout(() => { fecharModalContato(); carregarContatos(); }, 1500);
        } else mostrarErro('contato-erro', data.erro);
    }
</script>
</body>
</html>
